version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ml-ids-postgres
    environment:
      - POSTGRES_USER=mlids
      - POSTGRES_PASSWORD=mlids_password
      - POSTGRES_DB=mlids
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlids"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ml-ids:
    build:
      context: .
      dockerfile: src/inference_server/Dockerfile
    container_name: ml-ids
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "/app/validate_interface.py"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Database configuration
      - DATABASE_URL=postgresql+asyncpg://mlids:mlids_password@localhost:5432/mlids
      
      # MLflow configuration (required)
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}

      # AWS credentials for S3 (required)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      
      # Control whether CICFlowMeter is started
      - START_CICFLOWMETER=true
      
      # Model configuration
      - MLFLOW_MODEL_NAME=models:/ML_IDS_Model_v1/latest
      
      # CICFlowMeter configuration
      - CIC_INTERFACE=eth0
      
      # Optional configuration
      - LOG_DIR=/app/logs
      - LOG_NEGATIVE_PREDICTIONS=true
      
      # Alert configuration
      - ALERT_DEDUP_WINDOW_SECONDS=300
      - ALERT_NOTIFICATION_ENABLED=false
      
      # Notifications (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-ML-IDS Alerts <alerts@mlids.local>}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      # Mount logs directory for persistence
      - /var/log/ml-ids:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

# To use this file:
# 1. Update environment variables with your actual values
# 2. Run: docker-compose up -d
# 3. Check logs: docker-compose logs -f ml-ids

